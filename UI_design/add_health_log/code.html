<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-slate-900/80 backdrop-blur-md">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<button class="text-blue-700 dark:text-blue-400 p-2 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full transition-transform active:scale-95 duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-blue-700 dark:text-blue-400">Add Log</h1>
</div>
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="portrait of a smiling male doctor in professional attire, soft studio lighting, clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_Nb_ClzYq4PjxQrZzd_z6NlGvhA0K0-G5RhA1_sCXQ70HJtq4vnD63j6wlWwB6Rcxgidtsg6buXQFkp0DuQawprgtSIbYZAVJSB1EtLC3Jv2grzmSv_0-ytjtE57sNCkZPUKC0Mb2cn1lh-TsGbHfovtHnec9iuGhBeJtfZfBD48t5Qwds7_RJPRwzW-BzObM7kHJ7015o505QQ8QR1jxWLN3uVKYHS4J3NykxA8aPFCtaepI3ssCYEAUHyVcWh9Tamos1njtweU0"/>
</div>
</div>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Metric Selection -->
<section class="mb-10">
<label class="block text-sm font-medium text-on-surface-variant mb-4 px-1">Choose Metric</label>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
<!-- BP -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-28 rounded-2xl bg-primary-container text-on-primary-container shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined text-3xl mb-2">blood_pressure</span>
<span class="text-xs font-semibold tracking-wide">BP</span>
</button>
<!-- Sugar -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-28 rounded-2xl bg-surface-container-lowest text-on-surface hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-tertiary">glucose</span>
<span class="text-xs font-semibold tracking-wide">Sugar</span>
</button>
<!-- Weight -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-28 rounded-2xl bg-surface-container-lowest text-on-surface hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-secondary">weight</span>
<span class="text-xs font-semibold tracking-wide">Weight</span>
</button>
<!-- Temp -->
<button class="flex-shrink-0 flex flex-col items-center justify-center w-24 h-28 rounded-2xl bg-surface-container-lowest text-on-surface hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-error">thermostat</span>
<span class="text-xs font-semibold tracking-wide">Temp</span>
</button>
</div>
</section>
<!-- Numeric Input Hero -->
<section class="mb-12 text-center">
<div class="inline-flex flex-col items-center">
<span class="text-sm font-bold text-primary mb-2 uppercase tracking-widest">Systolic / Diastolic</span>
<div class="flex items-baseline gap-2">
<input class="w-32 text-center text-7xl font-['Manrope'] font-extrabold bg-transparent border-none focus:ring-0 text-on-surface p-0" placeholder="000" type="text" value="120"/>
<span class="text-4xl font-light text-outline-variant">/</span>
<input class="w-32 text-center text-7xl font-['Manrope'] font-extrabold bg-transparent border-none focus:ring-0 text-on-surface p-0" placeholder="00" type="text" value="80"/>
</div>
<div class="mt-4 inline-flex items-center gap-2 bg-secondary-container px-4 py-1.5 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-xs font-bold text-on-secondary-container">NORMAL RANGE</span>
</div>
</div>
</section>
<!-- Form Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
<!-- Date Picker -->
<div class="bg-surface-container-low p-5 rounded-2xl">
<label class="block text-[11px] font-bold text-outline uppercase tracking-wider mb-2">Date</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">calendar_today</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-semibold p-0 w-full" type="date" value="2023-11-24"/>
</div>
</div>
<!-- Time Picker -->
<div class="bg-surface-container-low p-5 rounded-2xl">
<label class="block text-[11px] font-bold text-outline uppercase tracking-wider mb-2">Time</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">schedule</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface font-semibold p-0 w-full" type="time" value="09:41"/>
</div>
</div>
</div>
<!-- Additional Context Bento -->
<section class="grid grid-cols-2 gap-4 mb-12">
<div class="col-span-2 md:col-span-1 bg-surface-container-lowest p-6 rounded-[24px] shadow-sm">
<h3 class="text-sm font-bold text-on-surface mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">notes</span>
                    Notes
                </h3>
<textarea class="w-full bg-surface-container-low border-none rounded-xl text-sm focus:ring-2 focus:ring-primary/20 min-h-[100px] resize-none" placeholder="Feeling a bit lightheaded..."></textarea>
</div>
<div class="col-span-2 md:col-span-1 flex flex-col gap-4">
<div class="bg-surface-container-lowest p-6 rounded-[24px] shadow-sm flex-1 flex items-center justify-between">
<div>
<h3 class="text-sm font-bold text-on-surface mb-1">Medication</h3>
<p class="text-xs text-on-surface-variant">Taken with Amlodipine</p>
</div>
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed">pill</span>
</div>
</div>
<div class="bg-surface-container-lowest p-6 rounded-[24px] shadow-sm flex-1 flex items-center justify-between">
<div>
<h3 class="text-sm font-bold text-on-surface mb-1">Position</h3>
<p class="text-xs text-on-surface-variant">Sitting Down</p>
</div>
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed">airline_seat_recline_normal</span>
</div>
</div>
</div>
</section>
<!-- Save Button -->
<div class="fixed bottom-32 left-0 w-full px-6 flex justify-center pointer-events-none">
<button class="pointer-events-auto w-full max-w-lg h-14 bg-primary text-on-primary rounded-full font-['Manrope'] font-bold text-base shadow-[0_8px_24px_-4px_rgba(0,94,164,0.3)] hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Save Log
            </button>
</div>

<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-6">

<span class="font-['Manrope'] font-medium text-[11px] mt-1">Home</span>

<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:opacity-80 transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">family_restroom</span>
<span class="font-['Manrope'] font-medium text-[11px] mt-1">Family</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:opacity-80 transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">medication</span>
<span class="font-['Manrope'] font-medium text-[11px] mt-1">Medicines</span>

<a class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-800 dark:text-blue-200 rounded-full px-5 py-1.5 transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">description</span>
<span class="font-['Manrope'] font-medium text-[11px] mt-1">Records</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:opacity-80 transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-['Manrope'] font-medium text-[11px] mt-1">Settings</span>
